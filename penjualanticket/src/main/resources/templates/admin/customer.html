<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Customer - Admin TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<div class="admin-layout">
    <!-- Left Sidebar -->
    <div class="admin-sidebar">
        <div class="sidebar-brand">
            Admin Ticket<span>Hub</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/admin/event"><i class="bi bi-calendar-event"></i> Kelola Event</a></li>
            <li><a href="/admin/riwayat"><i class="bi bi-receipt"></i> Riwayat Pembelian</a></li>
            <li><a href="/admin/customer" class="active"><i class="bi bi-people"></i> Kelola Customer</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/admin/logout" class="btn btn-danger btn-sm w-100"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Kelola Customer</h2>
        </div>

        <div class="card p-3 p-md-4">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th>Nama Customer</th>
                            <th>Email</th>
                            <th>No Telepon</th>
                            <th class="text-center" style="width: 180px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${customers}">
                            <td class="fw-bold text-secondary" th:text="${c.idCustomer}"></td>
                            <td class="fw-bold text-white" th:text="${c.name}"></td>
                            <td th:text="${c.email}"></td>
                            <td th:text="${c.noTlp != null ? c.noTlp : '-'}"></td>
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center">
                                    <a th:href="@{'/admin/customer/edit/' + ${c.idCustomer}}" class="btn btn-primary btn-sm px-3 py-1.5" style="font-size: 0.85rem;">Edit</a>
                                    <a th:href="@{'/admin/customer/delete/' + ${c.idCustomer}}"
                                       class="btn btn-danger btn-sm px-3 py-1.5"
                                       style="font-size: 0.85rem;"
                                       onclick="return confirm('Apakah Anda yakin ingin menghapus customer ini?');">Hapus</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
