<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">Admin Ticket<span>Hub</span></a>
        <div class="d-flex gap-2">
            <a href="/admin/event" class="btn btn-outline-light btn-sm">Kelola Event</a>
            <a href="/admin/riwayat" class="btn btn-outline-light btn-sm">Riwayat Pembelian</a>
            <a href="/admin/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 1200px;">
    <h2 class="mb-4 fw-bold">Dashboard Admin</h2>

    <div class="row g-4">
        <!-- Total Customer Card -->
        <div class="col-md-6 col-lg-3">
            <div class="card admin-stat-card h-100 p-3">
                <div class="card-body">
                    <p class="text-secondary small text-uppercase mb-2">Total Customer</p>
                    <h1 class="fw-extrabold text-primary mb-0" th:text="${totalCustomer}">0</h1>
                </div>
            </div>
        </div>

        <!-- Total Event Card -->
        <div class="col-md-6 col-lg-3">
            <div class="card admin-stat-card h-100 p-3">
                <div class="card-body">
                    <p class="text-secondary small text-uppercase mb-2">Total Event</p>
                    <h1 class="fw-extrabold text-info mb-0" th:text="${totalEvent}">0</h1>
                </div>
            </div>
        </div>

        <!-- Total Transaksi Card -->
        <div class="col-md-6 col-lg-3">
            <div class="card admin-stat-card h-100 p-3">
                <div class="card-body">
                    <p class="text-secondary small text-uppercase mb-2">Total Transaksi</p>
                    <h1 class="fw-extrabold text-success mb-0" th:text="${totalTransaksi}">0</h1>
                </div>
            </div>
        </div>

        <!-- Total Pendapatan Card -->
        <div class="col-md-6 col-lg-3">
            <div class="card admin-stat-card h-100 p-3">
                <div class="card-body">
                    <p class="text-secondary small text-uppercase mb-2">Total Pendapatan (Lunas)</p>
                    <h2 class="fw-extrabold text-warning mb-0">
                        Rp <span th:text="${#numbers.formatDecimal(totalPendapatan, 0, 'POINT', 0, 'COMMA')}">0</span>
                    </h2>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
