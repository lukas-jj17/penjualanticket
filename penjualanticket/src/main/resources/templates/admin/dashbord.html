<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<div class="admin-layout">
    <!-- Left Sidebar -->
    <div class="admin-sidebar">
        <div class="sidebar-brand">
            Admin Ticket<span>Hub</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/admin/dashboard" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/admin/event"><i class="bi bi-calendar-event"></i> Kelola Event</a></li>
            <li><a href="/admin/riwayat"><i class="bi bi-receipt"></i> Riwayat Pembelian</a></li>
            <li><a href="/admin/customer"><i class="bi bi-people"></i> Kelola Customer</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/admin/logout" class="btn btn-danger btn-sm w-100"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="admin-content">
        <h2 class="mb-4 fw-bold text-white">Dashboard Admin</h2>

        <div class="row g-4">
            <!-- Total Customer Card (Clickable to /admin/customer) -->
            <div class="col-md-6 col-lg-3">
                <a href="/admin/customer" class="stat-card-link">
                    <div class="card admin-stat-card h-100 p-3">
                        <div class="card-body">
                            <p class="text-secondary small text-uppercase mb-2">Total Customer</p>
                            <h1 class="fw-extrabold text-primary mb-0" th:text="${totalCustomer}">0</h1>
                            <small class="text-muted mt-2 d-block">Klik untuk kelola &rarr;</small>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Total Event Card (Clickable to /admin/event) -->
            <div class="col-md-6 col-lg-3">
                <a href="/admin/event" class="stat-card-link">
                    <div class="card admin-stat-card h-100 p-3">
                        <div class="card-body">
                            <p class="text-secondary small text-uppercase mb-2">Total Event</p>
                            <h1 class="fw-extrabold text-info mb-0" th:text="${totalEvent}">0</h1>
                            <small class="text-muted mt-2 d-block">Klik untuk kelola &rarr;</small>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Total Transaksi Card (Clickable to /admin/riwayat) -->
            <div class="col-md-6 col-lg-3">
                <a href="/admin/riwayat" class="stat-card-link">
                    <div class="card admin-stat-card h-100 p-3">
                        <div class="card-body">
                            <p class="text-secondary small text-uppercase mb-2">Total Transaksi</p>
                            <h1 class="fw-extrabold text-success mb-0" th:text="${totalTransaksi}">0</h1>
                            <small class="text-muted mt-2 d-block">Klik untuk lihat &rarr;</small>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Total Pendapatan Card (Clickable to /admin/riwayat) -->
            <div class="col-md-6 col-lg-3">
                <a href="/admin/riwayat" class="stat-card-link">
                    <div class="card admin-stat-card h-100 p-3">
                        <div class="card-body">
                            <p class="text-secondary small text-uppercase mb-2">Total Pendapatan (Lunas)</p>
                            <h2 class="fw-extrabold text-warning mb-0">
                                Rp <span th:text="${#numbers.formatDecimal(totalPendapatan, 0, 'POINT', 0, 'COMMA')}">0</span>
                            </h2>
                            <small class="text-muted mt-2.5 d-block">Klik untuk lihat &rarr;</small>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
