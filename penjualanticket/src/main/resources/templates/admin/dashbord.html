<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">Admin TicketHub</a>
        <div>
            <a href="/admin/event" class="btn btn-outline-light btn-sm">Kelola Event</a>
            <a href="/admin/riwayat" class="btn btn-outline-light btn-sm">Riwayat Pembelian</a>
            <a href="/admin/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Dashboard Admin</h2>

    <div class="row">
        <div class="col-md-3 mb-3">
            <div class="card text-bg-primary text-white">
                <div class="card-body">
                    <h1 th:text="${totalCustomer}">0</h1>
                    <p class="mb-0">Total Customer</p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card text-bg-success text-white">
                <div class="card-body">
                    <h1 th:text="${totalEvent}">0</h1>
                    <p class="mb-0">Total Event</p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card text-bg-info text-white">
                <div class="card-body">
                    <h1 th:text="${totalTransaksi}">0</h1>
                    <p class="mb-0">Total Transaksi</p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card text-bg-warning text-dark">
                <div class="card-body">
                    <h1>Rp. <span th:text="${totalPendapatan}">0</span></h1>
                    <p class="mb-0">Total Pendapatan (Lunas)</p>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
