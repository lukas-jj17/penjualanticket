<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${event.idTiket != null} ? 'Edit Event' : 'Tambah Event'">Form Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">Admin TicketHub</a>
        <a href="/admin/event" class="btn btn-outline-light btn-sm">Kembali</a>
    </div>
</nav>

<div class="container mt-5" style="max-width:600px;">

    <h2 th:text="${event.idTiket != null} ? 'Edit Event' : 'Tambah Event'">Form Event</h2>

    <form action="/admin/event/save" method="post" enctype="multipart/form-data" th:object="${event}">

        <input type="hidden" th:field="*{idTiket}">

        <label>Nama Event</label>
        <input type="text" th:field="*{nameEvent}" class="form-control mb-3" required>

        <label>Harga Tiket</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control mb-3" required>

        <label>Stok Tiket</label>
        <input type="number" th:field="*{stock}" class="form-control mb-3" required>

        <label>Deskripsi</label>
        <textarea th:field="*{description}" class="form-control mb-3"></textarea>

        <label>Kategori</label>
        <select name="categoryId" class="form-control mb-3" required>
            <option value="">-- Pilih Kategori --</option>
            <option th:each="c : ${categories}"
                    th:value="${c.idCategory}"
                    th:text="${c.nameCategory}"
                    th:selected="${event.category != null and event.category.idCategory == c.idCategory}"></option>
        </select>

        <label>Poster Event</label>
        <input type="file" name="gambar" class="form-control mb-2" accept="image/*">

        <div th:if="${event.photo != null}" class="mb-3">
            <small class="text-muted">Poster saat ini:</small><br>
            <img th:src="@{'/uploads/' + ${event.photo}}" width="120" class="rounded">
        </div>

        <button class="btn btn-primary">Simpan Event</button>

    </form>

</div>

</body>
</html>
