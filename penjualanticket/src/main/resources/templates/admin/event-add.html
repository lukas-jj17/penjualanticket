<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.idTiket != null} ? 'Edit Event - Admin TicketHub' : 'Tambah Event - Admin TicketHub'">Form Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<div class="admin-layout">
    <!-- Left Sidebar -->
    <div class="admin-sidebar">
        <div class="sidebar-brand">
            Admin Ticket<span>Hub</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/admin/event" class="active"><i class="bi bi-calendar-event"></i> Kelola Event</a></li>
            <li><a href="/admin/riwayat"><i class="bi bi-receipt"></i> Riwayat Pembelian</a></li>
            <li><a href="/admin/customer"><i class="bi bi-people"></i> Kelola Customer</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/admin/logout" class="btn btn-danger btn-sm w-100"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="admin-content">
        <div class="container mt-2" style="max-width: 680px; padding: 0;">
            <div class="card p-4 p-md-5">
                <h2 class="fw-bold mb-4" th:text="${event.idTiket != null} ? 'Edit Event' : 'Tambah Event Baru'">Form Event</h2>

                <form action="/admin/event/save" method="post" enctype="multipart/form-data" th:object="${event}">
                    <input type="hidden" th:field="*{idTiket}">

                    <div class="mb-3">
                        <label class="form-label">Nama Event</label>
                        <input type="text" th:field="*{nameEvent}" class="form-control" required placeholder="Masukkan nama event">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Harga Tiket (Rp)</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" required placeholder="Contoh: 150000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Stok Tiket</label>
                            <input type="number" th:field="*{stock}" class="form-control" required placeholder="Contoh: 100">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Kategori</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="">-- Pilih Kategori --</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c.idCategory}"
                                    th:text="${c.nameCategory}"
                                    th:selected="${event.category != null and event.category.idCategory == c.idCategory}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Deskripsi Event</label>
                        <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Tuliskan detail deskripsi event di sini..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Poster Event (Gambar)</label>
                        <input type="file" name="gambar" class="form-control" accept="image/*">
                        
                        <div th:if="${event.photo != null}" class="mt-3 p-3 rounded border border-secondary border-opacity-20 d-inline-block bg-black bg-opacity-20">
                            <small class="text-secondary d-block mb-2">Poster Saat Ini:</small>
                            <img th:src="@{'/uploads/' + ${event.photo}}" width="140" class="rounded border border-secondary border-opacity-10">
                        </div>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary px-4 py-2.5">Simpan Event</button>
                        <a href="/admin/event" class="btn btn-outline-light px-4 py-2.5">Kembali</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
