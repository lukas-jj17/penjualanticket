<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.idTiket != null} ? 'Edit Event - Admin Eventix' : 'Tambah Event - Admin Eventix'">Form
        Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>

<body>

    <div class="admin-layout">
        <!-- Left Sidebar -->
        <div class="admin-sidebar">
            <div class="sidebar-brand">
                Admin Event<span>ix</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li><a href="/admin/event" class="active"><i class="bi bi-calendar-event"></i> Kelola Event</a></li>
                <li><a href="/admin/riwayat"><i class="bi bi-receipt"></i> Riwayat Pembelian</a></li>
                <li><a href="/admin/customer"><i class="bi bi-people"></i> Kelola Customer</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="/admin/logout" class="btn btn-danger btn-sm w-100"><i class="bi bi-box-arrow-left"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="admin-content">
            <div class="container mt-2" style="max-width: 680px; padding: 0;">
                <div class="card p-4 p-md-5">
                    <h2 class="fw-bold mb-4" th:text="${event.idTiket != null} ? 'Edit Event' : 'Tambah Event Baru'">
                        Form Event</h2>

                    <form action="/admin/event/save" method="post" enctype="multipart/form-data" th:object="${event}">
                        <input type="hidden" th:field="*{idTiket}">

                        <div class="mb-3">
                            <label class="form-label">Nama Event</label>
                            <input type="text" th:field="*{nameEvent}" class="form-control" required
                                placeholder="Masukkan nama event">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Harga Tiket (Rp)</label>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" required
                                    placeholder="Contoh: 150000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Stok Tiket</label>
                                <input type="number" th:field="*{stock}" class="form-control" required
                                    placeholder="Contoh: 100">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kategori</label>
                            <select name="categoryId" class="form-select" required>
                                <option value="">-- Pilih Kategori --</option>
                                <option th:each="c : ${categories}" th:value="${c.idCategory}"
                                    th:text="${c.nameCategory}"
                                    th:selected="${event.category != null and event.category.idCategory == c.idCategory}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kota</label>
                            <select th:field="*{city}" class="form-select" required>
                                <option value="">-- Pilih Kota --</option>
                                <option value="Jakarta">Jakarta</option>
                                <option value="Bandung">Bandung</option>
                                <option value="Surabaya">Surabaya</option>
                                <option value="Jogja">Jogja</option>
                                <option value="Solo">Solo</option>
                                <option value="Bali">Bali</option>
                                <option value="Pontianak">Pontianak</option>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Tanggal Event</label>
                                <input type="date" th:field="*{eventDate}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Jam Event</label>
                                <input type="text" th:field="*{eventTime}" class="form-control" required placeholder="Contoh: 19:00 WIB">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tempat / Venue</label>
                            <input type="text" th:field="*{location}" class="form-control" required placeholder="Contoh: Graha Unesa, Stadion GBK, dll.">
                        </div>

                        <!-- Durasi Hari Event -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Dari Hari</label>
                                <select th:field="*{startDay}" class="form-select">
                                    <option value="">-- Pilih Hari --</option>
                                    <option value="Senin">Senin</option>
                                    <option value="Selasa">Selasa</option>
                                    <option value="Rabu">Rabu</option>
                                    <option value="Kamis">Kamis</option>
                                    <option value="Jumat">Jumat</option>
                                    <option value="Sabtu">Sabtu</option>
                                    <option value="Minggu">Minggu</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Sampai Hari</label>
                                <select th:field="*{endDay}" class="form-select">
                                    <option value="">-- Pilih Hari --</option>
                                    <option value="Senin">Senin</option>
                                    <option value="Selasa">Selasa</option>
                                    <option value="Rabu">Rabu</option>
                                    <option value="Kamis">Kamis</option>
                                    <option value="Jumat">Jumat</option>
                                    <option value="Sabtu">Sabtu</option>
                                    <option value="Minggu">Minggu</option>
                                </select>
                            </div>
                        </div>

                        <!-- Checkbox Kategori Tiket (VIP & Early Bird) -->
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="checkCustomCategories" th:field="*{hasCustomCategories}">
                            <label class="form-check-label text-warning fw-bold" for="checkCustomCategories">
                                Aktifkan Kategori Tiket Tambahan (VIP &amp; Early Bird)
                            </label>
                        </div>

                        <!-- Kontainer Kategori Tiket Tambahan -->
                        <div id="customCategoriesSection" class="p-3 mb-3 border border-secondary border-opacity-30 rounded bg-dark bg-opacity-20" style="display: none;">
                            <h6 class="text-white fw-bold mb-3"><i class="bi bi-tags-fill text-warning me-2"></i>Harga Tiket Tambahan</h6>
                            <p class="text-secondary small mb-3">Catatan: Harga Reguler akan menggunakan input utama "Harga Tiket" di atas.</p>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small">VIP (Rp)</label>
                                    <input type="number" step="0.01" th:field="*{vipPrice}" class="form-control" placeholder="Contoh: 350000">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small">Early Bird (Rp)</label>
                                    <input type="number" step="0.01" th:field="*{earlyBirdPrice}" class="form-control" placeholder="Contoh: 100000">
                                </div>
                            </div>
                        </div>

                        <!-- Checkbox Harga Hari Kunjungan -->
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="checkDayPrices" th:field="*{hasDayPrices}">
                            <label class="form-check-label text-warning fw-bold" for="checkDayPrices">
                                Aktifkan Harga Khusus Hari Kunjungan (Weekday / Weekend)
                            </label>
                        </div>

                        <!-- Kontainer Harga Hari Kunjungan -->
                        <div id="dayPricesSection" class="p-3 mb-3 border border-secondary border-opacity-30 rounded bg-dark bg-opacity-20" style="display: none;">
                            <h6 class="text-white fw-bold mb-3"><i class="bi bi-calendar-range-fill text-warning me-2"></i>Harga per Hari Kunjungan</h6>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small">Weekday (Senin - Jumat) (Rp)</label>
                                    <input type="number" step="0.01" th:field="*{weekdayPrice}" class="form-control" placeholder="Contoh: 120000">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small">Weekend (Sabtu - Minggu) (Rp)</label>
                                    <input type="number" step="0.01" th:field="*{weekendPrice}" class="form-control" placeholder="Contoh: 180000">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Deskripsi Event</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"
                                placeholder="Tuliskan detail deskripsi event di sini..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Poster Event (Gambar)</label>
                            <input type="file" name="gambar" class="form-control" accept="image/*">

                            <div th:if="${event.photo != null}"
                                class="mt-3 p-3 rounded border border-secondary border-opacity-20 d-inline-block bg-black bg-opacity-20">
                                <small class="text-secondary d-block mb-2">Poster Saat Ini:</small>
                                <img th:src="@{'/uploads/' + ${event.photo}}" width="140"
                                    class="rounded border border-secondary border-opacity-10">
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-primary px-4 py-2.5">Simpan Event</button>
                            <a href="/admin/event" class="btn btn-outline-light px-4 py-2.5">Kembali</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Toggle Kategori Tiket
            const checkboxCat = document.getElementById('checkCustomCategories');
            const sectionCat = document.getElementById('customCategoriesSection');
            
            function toggleSectionCat() {
                if (checkboxCat && checkboxCat.checked) {
                    sectionCat.style.display = 'block';
                } else {
                    sectionCat.style.display = 'none';
                }
            }
            
            if (checkboxCat) {
                checkboxCat.addEventListener('change', toggleSectionCat);
                toggleSectionCat();
            }

            // Toggle Harga Hari Kunjungan
            const checkboxDay = document.getElementById('checkDayPrices');
            const sectionDay = document.getElementById('dayPricesSection');
            
            function toggleSectionDay() {
                if (checkboxDay && checkboxDay.checked) {
                    sectionDay.style.display = 'block';
                } else {
                    sectionDay.style.display = 'none';
                }
            }
            
            if (checkboxDay) {
                checkboxDay.addEventListener('change', toggleSectionDay);
                toggleSectionDay();
            }
        });
    </script>
</body>

</html>
