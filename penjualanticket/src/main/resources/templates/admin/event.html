<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Event - Admin Eventix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<div class="admin-layout">
    <!-- Left Sidebar -->
    <div class="admin-sidebar">
        <div class="sidebar-brand">
            Admin Event<span>ix</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/admin/event" class="active"><i class="bi bi-calendar-event"></i> Kelola Event</a></li>
            <li><a href="/admin/riwayat"><i class="bi bi-receipt"></i> Riwayat Pembelian</a></li>
            <li><a href="/admin/customer"><i class="bi bi-people"></i> Kelola Customer</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/admin/logout" class="btn btn-danger btn-sm w-100"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="admin-content">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
            <h2 class="fw-bold mb-0">Kelola Event</h2>
            <a href="/admin/event/add" class="btn btn-success px-4 py-2.5">+ Tambah Event Baru</a>
        </div>

        <div class="card p-3 p-md-4">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th style="width: 120px;">Poster</th>
                            <th>Nama Event</th>
                            <th>Harga Tiket</th>
                            <th style="width: 120px;">Stok</th>
                            <th class="text-center" style="width: 180px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${events}">
                            <td class="fw-bold text-secondary" th:text="${e.idTiket}"></td>
                            <td>
                                <div class="rounded overflow-hidden border border-secondary border-opacity-20" style="width: 80px; height: 50px;">
                                    <img th:if="${e.photo != null}" th:src="@{'/uploads/' + ${e.photo}}" class="w-100 h-100 object-fit-cover">
                                    <img th:unless="${e.photo != null}" src="https://placehold.co/100x60?text=No+Photo" class="w-100 h-100 object-fit-cover">
                                </div>
                            </td>
                            <td class="fw-bold text-white" th:text="${e.nameEvent}"></td>
                            <td class="text-warning">Rp <span th:text="${#numbers.formatDecimal(e.price, 0, 'POINT', 0, 'COMMA')}"></span></td>
                            <td>
                                <span class="badge bg-secondary" th:text="${e.stock}">0</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center">
                                    <a th:href="@{'/admin/event/edit/' + ${e.idTiket}}" class="btn btn-primary btn-sm px-3 py-1.5" style="font-size: 0.85rem;">Edit</a>
                                    <a th:href="@{'/admin/event/delete/' + ${e.idTiket}}"
                                       class="btn btn-danger btn-sm px-3 py-1.5"
                                       style="font-size: 0.85rem;"
                                       onclick="return confirm('Apakah Anda yakin ingin menghapus event ini?');">Hapus</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
