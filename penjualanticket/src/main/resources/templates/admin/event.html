<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">Admin TicketHub</a>
        <a href="/admin/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Kelola Event</h2>
        <a href="/admin/event/add" class="btn btn-success">+ Tambah Event</a>
    </div>

    <table class="table table-bordered align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Poster</th>
                <th>Nama Event</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${events}">
                <td th:text="${e.idTiket}"></td>
                <td>
                    <img th:if="${e.photo != null}" th:src="@{'/uploads/' + ${e.photo}}" width="100">
                    <span th:unless="${e.photo != null}" class="text-muted small">-</span>
                </td>
                <td th:text="${e.nameEvent}"></td>
                <td th:text="${e.price}"></td>
                <td th:text="${e.stock}"></td>
                <td>
                    <a th:href="@{'/admin/event/edit/' + ${e.idTiket}}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{'/admin/event/delete/' + ${e.idTiket}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Hapus event ini?');">Hapus</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
