<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="login-card">
        <h2>Admin Portal</h2>
        
        <p class="text-center text-secondary mb-4">Masuk untuk mengelola event & transaksi TicketHub</p>

        <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

        <form action="/admin/login" method="post">
            <div class="mb-3">
                <label class="form-label">Email Admin</label>
                <input type="email" name="email" class="form-control" placeholder="admin@tickethub.com" required autocomplete="email">
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2.5 mb-3">Login Admin</button>
        </form>

        <div class="text-center mt-4">
            <a href="/login" class="text-muted small text-decoration-none">&larr; Login sebagai Customer</a>
        </div>
    </div>
</div>

</body>
</html>
