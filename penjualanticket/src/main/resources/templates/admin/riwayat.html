<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Riwayat Pembelian - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">Admin TicketHub</a>
        <div>
            <a href="/admin/event" class="btn btn-outline-light btn-sm">Kelola Event</a>
            <a href="/admin/riwayat" class="btn btn-light btn-sm">Riwayat Pembelian</a>
            <a href="/admin/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Daftar Riwayat Pembelian</h2>

    <div th:if="${#lists.isEmpty(riwayat)}" class="alert alert-info">
        Belum ada riwayat transaksi pembelian tiket.
    </div>

    <div th:unless="${#lists.isEmpty(riwayat)}" class="card">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>No Faktur</th>
                        <th>Customer</th>
                        <th>Tanggal</th>
                        <th>Total</th>
                        <th>Metode</th>
                        <th>Ref ID (bayar.gg)</th>
                        <th>Status</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${riwayat}">
                        <td class="fw-bold" th:text="${r.noFaktur}"></td>
                        <td>
                            <div th:text="${r.customer != null ? r.customer.name : 'Guest'}"></div>
                            <small class="text-muted" th:text="${r.customer != null ? r.customer.noTlp : '-'}"></small>
                        </td>
                        <td th:text="${r.tanggal}"></td>
                        <td>Rp. <span th:text="${r.totalBayar}"></span></td>
                        <td class="text-uppercase fw-bold text-secondary" th:text="${r.paymentMethod != null ? r.paymentMethod : '-'}"></td>
                        <td>
                            <small class="font-monospace text-muted" th:text="${r.referenceId != null ? r.referenceId : '-'}"></small>
                        </td>
                        <td>
                            <span th:if="${r.paymentStatus == 'SUCCESS'}" class="badge bg-success">Lunas</span>
                            <span th:if="${r.paymentStatus == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                            <span th:if="${r.paymentStatus == 'EXPIRED'}" class="badge bg-secondary">Expired</span>
                            <span th:if="${r.paymentStatus == 'FAILED'}" class="badge bg-danger">Gagal</span>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-1">
                                <!-- Link ke Nota Detail -->
                                <a th:href="@{'/nota/' + ${r.idPenjualan}}" target="_blank" class="btn btn-info btn-sm text-white">Nota</a>
                                
                                <!-- Form Manual Update Status (untuk kemudahan testing / admin override) -->
                                <form th:action="@{/admin/riwayat/update-status}" method="post" class="d-inline-flex gap-1 align-items-center">
                                    <input type="hidden" name="idPenjualan" th:value="${r.idPenjualan}">
                                    <select name="status" class="form-select form-select-sm" style="width: auto;" onchange="this.form.submit()">
                                        <option value="" disabled selected>Ubah Status</option>
                                        <option value="PENDING">PENDING</option>
                                        <option value="SUCCESS">SUCCESS</option>
                                        <option value="EXPIRED">EXPIRED</option>
                                        <option value="FAILED">FAILED</option>
                                    </select>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
