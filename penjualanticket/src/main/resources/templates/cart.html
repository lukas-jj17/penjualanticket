<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Ticket<span>Hub</span></a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Lanjut Belanja</a>
    </div>
</nav>

<div class="container mt-5" style="max-width: 1000px;">
    <h2 class="mb-4 fw-bold">Keranjang Belanja</h2>

    <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(cart)}" class="alert alert-info py-4 text-center">
        <p class="mb-2">Keranjang belanja Anda masih kosong.</p>
        <a href="/dashboard" class="btn btn-primary btn-sm mt-2">Cari Event Menarik</a>
    </div>

    <div th:unless="${#lists.isEmpty(cart)}" class="row g-4">
        <div class="col-lg-8">
            <div class="card p-3 p-md-4">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Nama Event</th>
                                <th>Harga</th>
                                <th class="text-center">Qty</th>
                                <th>Subtotal</th>
                                <th class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${cart}">
                                <td class="fw-bold" th:text="${item.ticket.nameEvent}"></td>
                                <td>Rp <span th:text="${#numbers.formatDecimal(item.ticket.price, 0, 'POINT', 0, 'COMMA')}"></span></td>
                                <td class="text-center" th:text="${item.qty}"></td>
                                <td class="text-warning fw-semibold">Rp <span th:text="${#numbers.formatDecimal(item.subtotal, 0, 'POINT', 0, 'COMMA')}"></span></td>
                                <td class="text-center">
                                    <form th:action="@{/cart/remove}" method="post" class="d-inline">
                                        <input type="hidden" name="idTicket" th:value="${item.ticket.idTiket}">
                                        <button class="btn btn-danger btn-sm px-3 py-1.5">Hapus</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-4">
                <h5 class="fw-bold mb-3 pb-2 border-bottom border-secondary border-opacity-20 text-secondary">Ringkasan Pemesanan</h5>
                
                <div class="d-flex justify-content-between mb-4">
                    <span class="text-secondary">Total Pembayaran:</span>
                    <span class="fs-5 fw-bold text-warning">Rp <span th:text="${#numbers.formatDecimal(total, 0, 'POINT', 0, 'COMMA')}"></span></span>
                </div>

                <form th:action="@{/cart/checkout}" method="post" class="mt-2">
                    <div class="mb-4">
                        <label class="form-label d-block text-secondary">Metode Pembayaran</label>
                        <div class="position-relative">
                            <input class="form-control fw-bold" type="text" value="QRIS (Instant Settlement)" readonly style="background-color: rgba(251, 191, 36, 0.05) !important; border-color: rgba(251, 191, 36, 0.2) !important; color: var(--accent) !important;">
                            <input type="hidden" name="paymentMethod" value="qris">
                        </div>
                    </div>
                    <button class="btn btn-success w-100 py-3 fw-bold">Bayar Sekarang</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
