<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Keranjang - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">TicketHub</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Lanjut Belanja</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-3">Keranjang Belanja</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(cart)}" class="alert alert-info">
        Keranjang masih kosong. <a href="/dashboard">Cari event</a>.
    </div>

    <div th:unless="${#lists.isEmpty(cart)}">
        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>Nama Event</th>
                    <th>Harga</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart}">
                    <td th:text="${item.ticket.nameEvent}"></td>
                    <td>Rp. <span th:text="${item.ticket.price}"></span></td>
                    <td th:text="${item.qty}"></td>
                    <td>Rp. <span th:text="${item.subtotal}"></span></td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="idTicket" th:value="${item.ticket.idTiket}">
                            <button class="btn btn-danger btn-sm">Hapus</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <h4 class="text-end">Total : Rp. <span th:text="${total}"></span></h4>

        <form th:action="@{/cart/checkout}" method="post" class="text-start mt-3" style="max-width: 400px; margin-left: auto;">
            <div class="mb-3">
                <label class="form-label d-block fw-bold text-start">Metode Pembayaran</label>
                <input class="form-control" type="text" value="QRIS" readonly>
                <input type="hidden" name="paymentMethod" value="qris">
            </div>
            <button class="btn btn-success w-100 py-2">Bayar Sekarang</button>
        </form>
    </div>

</div>

</body>
</html>
