<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Checkout Tiket</h2>

<div th:if="${error}" class="alert alert-danger">
Stok tiket tidak mencukupi. Silakan kurangi jumlah.
</div>

<form
th:action="@{/checkout/save}"
method="post">

<input type="hidden"
name="idTicket"
th:value="${ticket.idTiket}">

<div class="mb-3">

<label>Nama Event</label>

<input
class="form-control"
readonly
th:value="${ticket.nameEvent}">

</div>

<div class="mb-3">

<label>Harga</label>

<input
class="form-control"
readonly
th:value="${ticket.price}">

</div>

<div class="mb-3">

<label>Jumlah Tiket</label>

<input
type="number"
name="qty"
min="1"
class="form-control"
required>

</div>

<div class="mb-3">
<label class="form-label d-block fw-bold">Metode Pembayaran</label>
<input class="form-control" type="text" value="QRIS" readonly>
<input type="hidden" name="paymentMethod" value="qris">
</div>

<button
class="btn btn-success w-100 py-2">

Bayar Sekarang

</button>

</form>

</div>

</body>
</html>
