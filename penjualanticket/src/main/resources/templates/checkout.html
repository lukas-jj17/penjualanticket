<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Ticket<span>Hub</span></a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Kembali</a>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card p-4 p-md-5">
        <h2 class="fw-bold mb-4 text-center">Checkout Tiket</h2>

        <div th:if="${error}" class="alert alert-danger mb-4">
            Stok tiket tidak mencukupi. Silakan kurangi jumlah pembelian Anda.
        </div>

        <form th:action="@{/checkout/save}" method="post">
            <input type="hidden" name="idTicket" th:value="${ticket.idTiket}">

            <div class="mb-3">
                <label class="form-label">Nama Event</label>
                <input class="form-control fw-bold" readonly th:value="${ticket.nameEvent}" style="background-color: rgba(255,255,255,0.03) !important;">
            </div>

            <div class="mb-3">
                <label class="form-label">Harga Per Tiket</label>
                <input class="form-control text-warning fw-bold" readonly th:value="'Rp ' + ${#numbers.formatDecimal(ticket.price, 0, 'POINT', 0, 'COMMA')}" style="background-color: rgba(255,255,255,0.03) !important;">
            </div>

            <div class="mb-4">
                <label class="form-label">Jumlah Tiket</label>
                <input type="number" name="qty" min="1" class="form-control" placeholder="Masukkan jumlah tiket yang ingin dibeli" required value="1">
            </div>

            <div class="mb-4">
                <label class="form-label d-block text-secondary">Metode Pembayaran</label>
                <input class="form-control fw-bold" type="text" value="QRIS (Instant Settlement)" readonly style="background-color: rgba(251, 191, 36, 0.05) !important; border-color: rgba(251, 191, 36, 0.2) !important; color: var(--accent) !important;">
                <input type="hidden" name="paymentMethod" value="qris">
            </div>

            <button class="btn btn-success w-100 py-3 fw-bold mt-2">Bayar Sekarang</button>
        </form>
    </div>
</div>

</body>
</html>
