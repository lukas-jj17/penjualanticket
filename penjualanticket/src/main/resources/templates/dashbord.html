<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">TicketHub</a>
        <div>
            <a href="/cart" class="btn btn-outline-light btn-sm">Keranjang</a>
            <a href="/riwayat" class="btn btn-outline-light btn-sm">Riwayat</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-3">Daftar Event</h2>

    <!-- Pencarian & filter -->
    <form method="get" action="/dashboard" class="row g-2 mb-4">
        <div class="col-md-6">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Cari nama event..." th:value="${keyword}">
        </div>
        <div class="col-md-4">
            <select name="categoryId" class="form-select">
                <option value="">Semua Kategori</option>
                <option th:each="c : ${categories}"
                        th:value="${c.idCategory}"
                        th:text="${c.nameCategory}"
                        th:selected="${categoryId != null and categoryId == c.idCategory}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100">Cari</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(events)}" class="alert alert-info">
        Tidak ada event yang ditemukan.
    </div>

    <div class="row">

        <div class="col-md-4 mb-4" th:each="event : ${events}">
            <div class="card h-100">

                <img th:if="${event.photo != null}"
                     th:src="@{'/uploads/' + ${event.photo}}"
                     class="card-img-top" style="height:200px; object-fit:cover;">
                <img th:unless="${event.photo != null}"
                     src="https://placehold.co/600x300?text=Event"
                     class="card-img-top" style="height:200px; object-fit:cover;">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${event.nameEvent}"></h5>
                    <p class="text-muted mb-1">
                        Rp. <span th:text="${event.price}"></span>
                    </p>
                    <p class="small text-muted">
                        Stok: <span th:text="${event.stock}"></span>
                    </p>

                    <div class="mt-auto d-flex gap-2">
                        <a th:href="@{'/event/detail/' + ${event.idTiket}}"
                           class="btn btn-outline-primary btn-sm">Detail</a>

                        <form th:action="@{/cart/add}" method="post" class="flex-grow-1">
                            <input type="hidden" name="idTicket" th:value="${event.idTiket}">
                            <button class="btn btn-success btn-sm w-100">+ Keranjang</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
