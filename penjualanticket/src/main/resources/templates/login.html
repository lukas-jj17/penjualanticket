<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eventix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="login-card">
        <h2>Event<span>ix</span></h2>
        
        <p class="text-center text-secondary mb-4">Masuk untuk menjelajahi event seru di sekitarmu</p>

        <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="nama@email.com" required autocomplete="email">
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button class="btn btn-primary w-100 py-2.5 mb-3">Masuk Sekarang</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-secondary small mb-1">
                Belum punya akun? <a href="/register" class="text-primary fw-semibold text-decoration-none">Daftar di sini</a>
            </p>
            <a href="/admin/login" class="text-muted small text-decoration-none">Login sebagai Admin</a>
        </div>
    </div>
</div>

</body>
</html>
