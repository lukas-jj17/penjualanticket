<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nota Pembelian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width:700px;">
    <div class="card">
        <div class="card-body">

            <h2 class="text-center">NOTA PEMBELIAN</h2>
            <hr>

            <p class="mb-1">No Faktur : <span th:text="${penjualan.noFaktur}"></span></p>
            <p class="mb-1">Tanggal : <span th:text="${penjualan.tanggal}"></span></p>
            <p th:if="${penjualan.customer != null}">
                Customer : <span th:text="${penjualan.customer.name}"></span>
            </p>

            <table class="table table-bordered mt-3">
                <thead>
                    <tr>
                        <th>Nama Event</th>
                        <th>Qty</th>
                        <th>Harga</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${details}">
                        <td th:text="${d.ticket.nameEvent}"></td>
                        <td th:text="${d.qty}"></td>
                        <td>Rp. <span th:text="${d.ticket.price}"></span></td>
                        <td>Rp. <span th:text="${d.subtotal}"></span></td>
                    </tr>
                </tbody>
            </table>

            <h4 class="text-end">
                Total : Rp. <span th:text="${penjualan.totalBayar}"></span>
            </h4>

            <div class="d-flex gap-2 mt-3">
                <button onclick="window.print()" class="btn btn-primary">Cetak</button>
                <a th:href="@{'/nota/' + ${penjualan.idPenjualan} + '/pdf'}"
                   class="btn btn-danger">Unduh PDF</a>
                <a href="/dashboard" class="btn btn-secondary">Kembali ke Beranda</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
