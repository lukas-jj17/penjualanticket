<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Eventix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="login-card" style="width: 480px;">
        <h2>Event<span>ix</span></h2>
        
        <p class="text-center text-secondary mb-4">Buat akun untuk memesan tiket event dengan mudah</p>

        <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

        <form action="/register" method="post" th:object="${customer}">
            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Nama lengkap Anda" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="nama@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Nomor Telepon</label>
                <input type="text" th:field="*{noTlp}" class="form-control" placeholder="Contoh: 08123456789" required>
            </div>

            <button class="btn btn-success w-100 py-2.5 mb-3">Daftar Sekarang</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-secondary small mb-0">
                Sudah punya akun? <a href="/login" class="text-primary fw-semibold text-decoration-none">Login di sini</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
