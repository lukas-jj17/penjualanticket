<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Riwayat Pemesanan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">TicketHub</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Beranda</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-3">Riwayat Pemesanan</h2>

    <div th:if="${#lists.isEmpty(riwayat)}" class="alert alert-info">
        Belum ada transaksi.
    </div>

    <table th:unless="${#lists.isEmpty(riwayat)}" class="table table-bordered align-middle">
        <thead>
            <tr>
                <th>No Faktur</th>
                <th>Tanggal</th>
                <th>Total</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${riwayat}">
                <td th:text="${r.noFaktur}"></td>
                <td th:text="${r.tanggal}"></td>
                <td>Rp. <span th:text="${r.totalBayar}"></span></td>
                <td>
                    <a th:href="@{'/nota/' + ${r.idPenjualan}}" class="btn btn-primary btn-sm">Lihat Nota</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
