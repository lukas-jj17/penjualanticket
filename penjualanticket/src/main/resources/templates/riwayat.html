<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pemesanan - TicketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Ticket<span>Hub</span></a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Beranda</a>
    </div>
</nav>

<div class="container mt-5" style="max-width: 1000px;">
    <h2 class="mb-4 fw-bold">Riwayat Pemesanan</h2>

    <div th:if="${#lists.isEmpty(riwayat)}" class="alert alert-info py-4 text-center">
        <p class="mb-0">Belum ada riwayat transaksi pembelian tiket.</p>
    </div>

    <div th:unless="${#lists.isEmpty(riwayat)}" class="card p-3 p-md-4">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th>No Faktur</th>
                        <th>Tanggal</th>
                        <th>Metode</th>
                        <th>Total Bayar</th>
                        <th>Status</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${riwayat}">
                        <td class="fw-bold text-white" th:text="${r.noFaktur}"></td>
                        <td th:text="${r.tanggal}"></td>
                        <td class="text-uppercase fw-semibold text-secondary" th:text="${r.paymentMethod}"></td>
                        <td class="text-warning fw-semibold">Rp <span th:text="${#numbers.formatDecimal(r.totalBayar, 0, 'POINT', 0, 'COMMA')}"></span></td>
                        <td>
                            <span th:if="${r.paymentStatus == 'SUCCESS'}" class="badge bg-success">Lunas</span>
                            <span th:if="${r.paymentStatus == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                            <span th:if="${r.paymentStatus == 'EXPIRED'}" class="badge bg-danger">Expired</span>
                            <span th:if="${r.paymentStatus == 'FAILED'}" class="badge bg-danger">Gagal</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{'/nota/' + ${r.idPenjualan}}" class="btn btn-primary btn-sm px-3">Detail Nota</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
